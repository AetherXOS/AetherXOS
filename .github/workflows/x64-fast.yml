name: X64 Fast

on:
  pull_request:
    paths:
      - '.cargo/**'
      - '.config/**'
      - '.github/workflows/x64-fast.yml'
      - '.github/workflows/tier-reusable.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - 'src/**'
      - 'tests/**'
      - 'xtask/**'
  push:
    branches:
      - main
    paths:
      - '.cargo/**'
      - '.config/**'
      - '.github/workflows/x64-fast.yml'
      - '.github/workflows/tier-reusable.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - 'src/**'
      - 'tests/**'
      - 'xtask/**'
  workflow_dispatch:

concurrency:
  group: x64-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    uses: ./.github/workflows/tier-reusable.yml
    with:
      job_name: x64 / fast
      runner: ubuntu-24.04
      tier: fast
      timeout_minutes: 30
