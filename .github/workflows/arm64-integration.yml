name: ARM64 Integration

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

concurrency:
  group: arm64-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    uses: ./.github/workflows/tier-reusable.yml
    with:
      job_name: arm64 / integration
      runner: ubuntu-24.04-arm
      tier: integration
      timeout_minutes: 45
