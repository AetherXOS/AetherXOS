name: ARM64 Nightly

on:
  schedule:
    - cron: '0 16 * * 6,0'
  workflow_dispatch:

concurrency:
  group: arm64-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    uses: ./.github/workflows/tier-reusable.yml
    with:
      job_name: arm64 / nightly
      runner: ubuntu-24.04-arm
      tier: nightly
      timeout_minutes: 60
